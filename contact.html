        <main class="contact-page">
            <section class="contact-card">
                <p class="eyebrow">Contact</p>
                <h1>Let's talk about your next session!</h1>
                <p>
                    If you want to book a shot, fill out the form and I'll get back to you as soon as possible.
                </p>

                <form class="contact-form" id="contact-form">
                    <div class="form-group">
                        <label for="contact-name">Name</label>
                        <input id="contact-name" name="name" type="text" placeholder="Your name" required>
                    </div>

                    <div class="form-group">
                        <label for="contact-email">Email</label>
                        <input id="contact-email" name="email" type="email" placeholder="exemplu@domain.com" required>
                    </div>

                    <div class="form-group">
                        <label for="contact-message">Message</label>
                        <textarea id="contact-message" name="message" rows="6" placeholder="Tell me about what you'd like to discuss..." required></textarea>
                    </div>

                    <button class="submit-btn" type="submit">Send!</button>
                </form>

                <div class="contact-links">
                    <a class="icon-link" href="https://www.instagram.com/astrozen.photography/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
